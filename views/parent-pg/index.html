<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JJMMC ERP · Parent (PG)</title>
<link rel="stylesheet" href="/css/style.css"/>
<style>
/* Parent portal page-specific overrides (global UI in style.css) */
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
  <div class="brand">
    <div class="brand-logo">JJ</div>
    <div>
      <h1 style="font-size:14px">Parent Portal <span class="prog-badge prog-badge-pg">PG</span></h1>
      <small>JJMMC · PG Ward</small>
    </div>
  </div>
  <nav class="nav" id="sideNav">
    <div style="padding:4px 0">
      <div style="font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);padding:10px 16px 4px;text-transform:uppercase">Ward's Information</div>
      <a href="#" data-sec="dashboard" class="active">Dashboard</a>
      <a href="#" data-sec="ward">Ward Profile</a>
      <a href="#" data-sec="attendance">Attendance</a>
      <a href="#" data-sec="fees">Fee Payments</a>
      <a href="#" data-sec="results">Exam Results</a>
      <a href="#" data-sec="notices">Notices</a>
      <a href="#" data-sec="notifications">Notifications</a>
    </div>
  </nav>
</aside>
<section class="main">
  <div class="topbar">
    <div class="crumbs" id="crumb">Dashboard</div>
    <div class="who">
      <div class="avatar" id="avatar">P</div>
      <div style="line-height:1.1">
        <div id="whoName" style="font-weight:700;font-size:13px">Parent</div>
        <div style="color:var(--muted);font-size:11px">parent</div>
      </div>
      <button class="btn small secondary" id="logoutBtn">Logout</button>
    </div>
  </div>
  <div class="content" id="appContent"><div class="empty-msg">Loading…</div></div>
</section>
</div>
<script>
const $ = id => document.getElementById(id);
const API = async (url,opts={}) => {
  const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opts});
  const j=await r.json().catch(()=>({}));
  if(!r.ok){alert(j.error||'Error');throw new Error(j.error);}
  return j;
};
const fmt=v=>v==null?'—':v;
const fmtDate=d=>d?d.split('T')[0]:'—';
const badge=(t,c='gray')=>`<span class="badge ${c}">${t}</span>`;
const pctColor=p=>p>=75?'#34A853':p>=60?'#FBBC04':'#EA4335';

let currentSection='dashboard';
document.getElementById('sideNav').addEventListener('click',e=>{
  const a=e.target.closest('[data-sec]');if(!a)return;e.preventDefault();
  document.querySelectorAll('#sideNav a').forEach(x=>x.classList.remove('active'));
  a.classList.add('active');$('crumb').textContent=a.textContent.trim();
  currentSection=a.dataset.sec;loadSection(currentSection);
});

const sections={};

sections.dashboard = async c => {
  const d = await API('/api/parent/dashboard');
  const w=d.ward;
  c.innerHTML=`
    <div class="page-title"><h2>Welcome</h2></div>
    <div class="card" style="margin-bottom:14px">
      <h3 style="margin:0 0 12px;font-size:14px">Ward Details</h3>
      <div class="grid cols-4">
        <div class="card"><div class="sub">Name</div><div style="font-weight:600">${fmt(w?.full_name)}</div></div>
        <div class="card"><div class="sub">Roll No</div><div style="font-weight:600">${fmt(w?.roll_no)}</div></div>
        <div class="card"><div class="sub">Department</div><div style="font-weight:600">${fmt(w?.department)}</div></div>
        <div class="card"><div class="sub">Semester</div><div style="font-weight:600">${fmt(w?.semester)}</div></div>
      </div>
    </div>
    <div class="grid cols-2" style="margin-bottom:14px">
      <div class="card">
        <div class="sub">Total Fees Paid</div>
        <div style="font-size:28px;font-weight:500;color:var(--success)">₹${(d.total_fees_paid||0).toLocaleString()}</div>
      </div>
      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px">Attendance Summary</h3>
        ${d.attendance.map(a=>`<div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px">
          <span>${a.course_code}</span>
          <span style="display:flex;align-items:center;gap:8px">
            <div class="progress-bar"><div class="fill" style="width:${a.present/a.total*100||0}%;background:${pctColor(a.present/a.total*100||0)}"></div></div>
            <span style="color:${pctColor(a.present/a.total*100||0)}">${Math.round(a.present/a.total*100||0)}%</span>
          </span>
        </div>`).join('')||'<div style="color:var(--muted);font-size:13px">No attendance data</div>'}
      </div>
    </div>
    <div class="card">
      <h3 style="margin:0 0 10px;font-size:14px">Recent Notices</h3>
      ${d.notices.map(n=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)"><strong>${n.title}</strong><br><span style="font-size:12px;color:var(--muted)">${fmtDate(n.created_at)}</span></div>`).join('')||'<div class="empty-msg" style="padding:12px">No notices</div>'}
    </div>`;
};

sections.ward = async c => {
  const d = await API('/api/parent/ward');
  const w=d.ward;
  c.innerHTML=`
    <div class="page-title"><h2>Ward Profile</h2></div>
    <div class="card">
      <div class="grid cols-3">
        ${[['Full Name',w?.full_name],['Email',w?.email||'—'],['Roll No',w?.roll_no||'—'],
           ['Department',w?.department||'—'],['Semester',w?.semester||'—'],['Phone',w?.phone||'—'],
           ['Date of Birth',w?.dob||'—'],['Blood Group',w?.blood_group||'—'],['Address',w?.address||'—'],
           ['Parent Name',w?.parent_name||'—'],['Parent Phone',w?.parent_phone||'—']
        ].map(([l,v])=>`<div class="card" style="padding:12px"><div class="sub">${l}</div><div style="font-weight:600">${v}</div></div>`).join('')}
      </div>
    </div>`;
};

sections.attendance = async c => {
  const d = await API('/api/parent/attendance');
  c.innerHTML=`
    <div class="page-title"><h2>Attendance</h2></div>
    <div class="card" style="margin-bottom:14px">
      <h3 style="margin:0 0 10px;font-size:14px">Course-wise Summary</h3>
      <table><thead><tr><th>Course</th><th>Total</th><th>Present</th><th>Absent</th><th>%</th></tr></thead>
      <tbody>${d.summary.map(a=>`<tr><td>${a.course_code}</td><td>${a.total}</td><td>${a.present}</td>
        <td>${a.total-a.present}</td>
        <td style="color:${pctColor(a.percentage)};font-weight:700">${a.percentage}%</td>
      </tr>`).join('')||'<tr><td colspan="5" class="empty-msg">No data</td></tr>'}</tbody></table>
    </div>
    <div class="card" style="padding:0;overflow:auto">
    <table><thead><tr><th>Date</th><th>Course</th><th>Status</th></tr></thead>
    <tbody>${d.recent.map(a=>`<tr><td>${a.date}</td><td>${a.course_code}</td>
      <td>${a.status==='present'?badge('Present','green'):a.status==='absent'?badge('Absent','red'):badge(a.status,'yellow')}</td>
    </tr>`).join('')||'<tr><td colspan="3" class="empty-msg">No records</td></tr>'}
    </tbody></table></div>`;
};

sections.fees = async c => {
  const d = await API('/api/parent/fees');
  c.innerHTML=`
    <div class="page-title"><h2>Fee Payments</h2></div>
    <div class="card" style="margin-bottom:14px">
      <div class="sub">Total Fees Paid</div>
      <div style="font-size:32px;font-weight:500;color:var(--success)">₹${(d.total_paid||0).toLocaleString()}</div>
    </div>
    <div class="card" style="padding:0;overflow:auto">
    <table><thead><tr><th>Fee Type</th><th>Amount</th><th>Status</th><th>Reference</th><th>Date</th></tr></thead>
    <tbody>${d.payments.map(p=>`<tr><td>${p.fee_type}</td><td>₹${p.amount?.toLocaleString()}</td>
      <td>${p.status==='PAID'?badge('Paid','green'):badge(p.status,'yellow')}</td>
      <td>${fmt(p.reference)}</td><td>${fmtDate(p.paid_on)}</td>
    </tr>`).join('')||'<tr><td colspan="5" class="empty-msg">No payments</td></tr>'}
    </tbody></table></div>`;
};

sections.results = async c => {
  const d = await API('/api/parent/results');
  c.innerHTML=`
    <div class="page-title"><h2>Exam Results</h2></div>
    <div class="card" style="padding:0;overflow:auto">
    <table><thead><tr><th>Exam</th><th>Date</th><th>Marks</th><th>Total</th><th>Grade</th></tr></thead>
    <tbody>${d.results.map(r=>`<tr><td>${r.exam_title}</td><td>${fmtDate(r.exam_date)}</td>
      <td>${r.marks_obtained}</td><td>${r.total_marks}</td>
      <td>${badge(r.grade,r.grade==='F'?'red':r.grade.startsWith('A')?'green':'blue')}</td>
    </tr>`).join('')||'<tr><td colspan="5" class="empty-msg">No published results</td></tr>'}
    </tbody></table></div>`;
};

sections.notices = async c => {
  const d = await API('/api/parent/notices');
  c.innerHTML=`
    <div class="page-title"><h2>Notices & Circulars</h2></div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${d.items.map(n=>`<div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <strong>${n.title}</strong>
          <span style="display:flex;gap:6px;align-items:center">${badge(n.audience,'gray')}<span style="font-size:11px;color:var(--muted)">${fmtDate(n.created_at)}</span></span>
        </div>
        <div style="font-size:13px;color:var(--muted)">${n.body}</div>
      </div>`).join('')||'<div class="empty-msg">No notices</div>'}
    </div>`;
};

sections.notifications = async c => {
  const d = await API('/api/parent/notifications');
  c.innerHTML=`
    <div class="page-title"><h2>Notifications</h2></div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${d.items.map(n=>`<div class="card" style="${n.is_read?'opacity:.6':''}">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <strong>${n.title}</strong><span style="font-size:11px;color:var(--muted)">${fmtDate(n.sent_at)}</span>
        </div>
        <div style="font-size:13px;color:var(--muted)">${n.message}</div>
      </div>`).join('')||'<div class="empty-msg">No notifications</div>'}
    </div>`;
};

function loadSection(sec){
  const c=$('appContent');c.innerHTML='<div class="empty-msg">Loading…</div>';
  const fn=sections[sec];if(fn)fn(c);else c.innerHTML=`<div class="empty-msg">${sec} coming soon.</div>`;
}
fetch('/api/me').then(r=>r.json()).then(d=>{
  if(!d.user)return location.href='/login.html';
  $('whoName').textContent=d.user.full_name;
  $('avatar').textContent=d.user.full_name.charAt(0).toUpperCase();
});
$('logoutBtn').addEventListener('click',async()=>{ await fetch('/api/logout',{method:'POST'}); location.href='/login.html'; });
loadSection('dashboard');
</script>
</body>
</html>
