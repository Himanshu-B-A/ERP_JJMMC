<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline · JJMMC ERP</title>
  <meta name="theme-color" content="#0b5240" />
  <link rel="icon" type="image/png" href="/icons/favicon-32.png" sizes="32x32" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100dvh; display: grid; place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      background: radial-gradient(ellipse at top, #0b7c66 0%, #093e5e 60%, #06283a 100%);
      color: #f4fff9; padding: 32px;
    }
    .card {
      max-width: 420px; text-align: center; background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12); border-radius: 24px;
      padding: 36px 28px; backdrop-filter: blur(14px);
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }
    .card img { width: 72px; height: 72px; margin-bottom: 12px; }
    h1 { font-size: 22px; margin: 4px 0 10px; font-weight: 700; letter-spacing: -.2px; }
    p  { margin: 0 0 18px; opacity: .85; line-height: 1.5; font-size: 15px; }
    button {
      background: #0b7c66; color: #fff; border: 0; cursor: pointer;
      padding: 11px 22px; border-radius: 999px; font-size: 15px; font-weight: 600;
      box-shadow: 0 6px 18px rgba(11,124,102,.5);
    }
    button:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <div class="card">
    <img src="/images/logo.svg" alt="" />
    <h1>You're offline</h1>
    <p>JJMMC ERP can't reach the server right now. Reconnect and try again — this page will reload automatically.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
  <script>
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
