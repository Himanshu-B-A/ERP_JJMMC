<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="JJMMC logo">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0b7c66"/>
      <stop offset="100%" stop-color="#093e5e"/>
    </linearGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8fff7"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="url(#ring)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#ffffff" stroke-opacity=".25" stroke-width="1.5"/>

  <!-- Medical plus -->
  <g transform="translate(32 32)">
    <rect x="-5"  y="-18" width="10" height="36" rx="2" fill="url(#cross)"/>
    <rect x="-18" y="-5"  width="36" height="10" rx="2" fill="url(#cross)"/>
  </g>

  <!-- Subtle inner ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#ffffff" stroke-opacity=".14" stroke-width="1"/>
</svg>
