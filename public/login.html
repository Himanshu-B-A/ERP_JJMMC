<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JJMMC Medical College · Sign in</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <form id="loginForm" class="login-card" autocomplete="off">
      <div class="brand">
        <div class="brand-logo">JJ</div>
        <div>
          <h1>JJMMC Medical College</h1>
          <small>MBBS Programme · NMC Recognised · Sign in to your portal</small>
        </div>
      </div>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" placeholder="Enter your username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Password" required />
      </div>

      <button class="btn" type="submit">Sign in</button>
      <div id="msg" class="msg"></div>

      <div class="hint">
        Demo accounts (password = username + <code>123</code>):<br/>
        <code>admin</code> · <code>principal</code> · <code>faculty</code> · <code>student</code> · <code>parent</code>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      msg.textContent = ''; msg.className = 'msg';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        msg.textContent = 'Signed in. Redirecting…';
        msg.classList.add('ok');
        window.location.href = data.redirect;
      } catch (err) {
        msg.textContent = err.message;
        msg.classList.add('err');
      }
    });
  </script>
</body>
</html>
