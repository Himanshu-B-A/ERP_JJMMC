<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JJMMC Medical College · Sign in</title>

  <!-- PWA metadata (same as landing page so bookmark-from-login works too) -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0b5240" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JJMMC ERP" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg" />

  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <form id="loginForm" class="login-card" autocomplete="off">
      <div class="brand">
        <div class="brand-logo">JJ</div>
        <div>
          <h1>JJMMC Medical College</h1>
          <small>MBBS Programme · NMC Recognised · Sign in to your portal</small>
        </div>
      </div>

      <div class="field">
        <label>Programme</label>
        <div class="program-toggle" role="tablist" aria-label="Programme">
          <button type="button" class="program-opt is-active" data-program="UG" role="tab" aria-selected="true">
            <strong>UG</strong><span>Undergraduate · MBBS / BDS</span>
          </button>
          <button type="button" class="program-opt" data-program="PG" role="tab" aria-selected="false">
            <strong>PG</strong><span>Postgraduate · MD / MS / DNB</span>
          </button>
        </div>
        <input type="hidden" id="program" name="program" value="UG" />
      </div>

      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" placeholder="Enter your username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Password" required />
      </div>

      <button class="btn" type="submit">Sign in</button>
      <div id="msg" class="msg"></div>

      <div class="hint">
        Demo accounts (password = username + <code>123</code>):<br/>
        <strong>UG</strong> · <code>admin</code> · <code>principal</code> · <code>faculty</code> · <code>student</code> · <code>parent</code><br/>
        <strong>PG</strong> · <code>adminpg</code> · <code>principalpg</code> · <code>facultypg</code> · <code>studentpg</code> · <code>parentpg</code>
      </div>
    </form>
  </div>

  <script>
    // UG / PG segmented toggle
    const programInput = document.getElementById('program');
    document.querySelectorAll('.program-opt').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.program-opt').forEach((b) => {
          b.classList.remove('is-active');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add('is-active');
        btn.setAttribute('aria-selected', 'true');
        programInput.value = btn.dataset.program;
      });
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      msg.textContent = ''; msg.className = 'msg';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const program  = programInput.value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, program })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        msg.textContent = 'Signed in. Redirecting…';
        msg.classList.add('ok');
        window.location.href = data.redirect;
      } catch (err) {
        msg.textContent = err.message;
        msg.classList.add('err');
      }
    });
  </script>
</body>
</html>
